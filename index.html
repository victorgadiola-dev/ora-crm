<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ORA | Sistema de Propostas e CRM Comercial</title>
  <meta name="description" content="Sistema ORA para cadastro, CRM, kanban, dashboard comercial e geração de propostas HTML imprimíveis.">
  <style>
    :root{
      --navy:#011E41;
      --navy-2:#041E42;
      --blue:#0082CB;
      --blue-2:#0085CA;
      --terracotta:#AC441E;
      --warm:#C4BEB6;
      --off:#F7F5F1;
      --paper:#FFFFFF;
      --ink:#172136;
      --muted:#6A7284;
      --line:rgba(1,30,65,.12);
      --line-strong:rgba(1,30,65,.22);
      --success:#116B4D;
      --danger:#9A2E22;
      --warning:#B46A1B;
      --shadow:0 24px 80px rgba(1,30,65,.16);
      --radius:22px;
      --radius-sm:14px;
      --font:'Gibbs','Aptos','Inter','Segoe UI',Arial,sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--font);
      color:var(--ink);
      background:
        radial-gradient(circle at top right, rgba(0,130,203,.12), transparent 34rem),
        linear-gradient(180deg,#fbfaf7 0%,#f3f0eb 100%);
      min-height:100%;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    button,input,select,textarea{font-family:inherit}
    button{cursor:pointer}
    a{color:var(--blue);text-decoration:none}
    .app-shell{display:grid;grid-template-columns:292px 1fr;min-height:100vh}
    .sidebar{
      position:sticky;top:0;height:100vh;overflow:auto;
      background:linear-gradient(180deg,var(--navy),#02162f);
      color:white;padding:26px 22px;border-right:1px solid rgba(255,255,255,.08);
    }
    .sidebar::after{
      content:"";position:absolute;inset:auto -150px -120px auto;width:360px;height:360px;
      background:var(--sidebar-pattern) center/cover no-repeat;opacity:.06;pointer-events:none;
    }
    .brand-block{display:flex;align-items:center;gap:14px;margin-bottom:28px;position:relative;z-index:1}
    .brand-mark{height:33px;width:auto;display:block;filter:brightness(0) invert(1)}
    .brand-title{font-weight:700;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.72)}
    .brand-sub{font-size:12px;color:rgba(255,255,255,.48);margin-top:2px}
    .nav-group-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.42);margin:26px 11px 9px}
    .nav-btn{
      display:flex;align-items:center;gap:12px;width:100%;border:0;background:transparent;color:rgba(255,255,255,.78);
      padding:12px 12px;border-radius:15px;text-align:left;font-size:14px;transition:.16s ease;position:relative;z-index:1
    }
    .nav-btn:hover,.nav-btn.active{background:rgba(255,255,255,.10);color:#fff}
    .nav-icon{width:26px;height:26px;border-radius:10px;display:grid;place-items:center;background:rgba(255,255,255,.09);font-size:13px;color:#fff}
    .nav-btn.active .nav-icon{background:var(--blue)}
    .sidebar-foot{margin-top:30px;padding:16px;border:1px solid rgba(255,255,255,.12);border-radius:18px;background:rgba(255,255,255,.06);position:relative;z-index:1}
    .sidebar-foot strong{display:block;font-size:13px;margin-bottom:6px}
    .sidebar-foot span{display:block;color:rgba(255,255,255,.55);font-size:12px;line-height:1.45}
    .main{min-width:0;padding:26px 30px 56px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:24px}
    .page-kicker{font-size:12px;text-transform:uppercase;letter-spacing:.13em;color:var(--blue);font-weight:800;margin-bottom:5px}
    .page-title{font-size:34px;line-height:1.05;font-weight:300;margin:0;color:var(--navy)}
    .page-title strong{font-weight:800}
    .page-sub{margin:8px 0 0;color:var(--muted);font-size:14px;max-width:780px;line-height:1.55}
    .user-chip{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);box-shadow:0 8px 30px rgba(1,30,65,.08);border-radius:999px;padding:8px 10px 8px 13px}
    .avatar{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;background:var(--navy);color:white;font-weight:800}
    .user-meta{font-size:12px;color:var(--muted)}
    .user-meta strong{display:block;font-size:13px;color:var(--navy)}
    .grid{display:grid;gap:18px}
    .grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .card{
      background:rgba(255,255,255,.88);border:1px solid var(--line);border-radius:var(--radius);
      box-shadow:0 18px 60px rgba(1,30,65,.08);padding:22px;position:relative;overflow:hidden
    }
    .card::before{content:"";position:absolute;inset:0 auto auto 0;width:4px;height:100%;background:linear-gradient(180deg,var(--blue),transparent);opacity:.88}
    .card.clean::before{display:none}
    .card.dark{background:linear-gradient(135deg,var(--navy),#062b57);color:#fff;border-color:rgba(255,255,255,.10)}
    .card.dark .muted,.card.dark .section-hint{color:rgba(255,255,255,.66)}
    .metric .label{font-size:12px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);font-weight:800}
    .metric .value{font-size:32px;font-weight:300;color:var(--navy);margin-top:9px;line-height:1}
    .metric .value strong{font-weight:800}
    .metric .micro{font-size:12px;color:var(--muted);margin-top:9px;line-height:1.4}
    .card.dark .metric .label,.card.dark .metric .micro{color:rgba(255,255,255,.66)}
    .card.dark .metric .value{color:#fff}
    .actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .btn{
      border:1px solid transparent;background:var(--navy);color:#fff;padding:11px 15px;border-radius:14px;
      font-weight:800;font-size:13px;display:inline-flex;align-items:center;gap:9px;min-height:42px;justify-content:center;transition:.16s ease
    }
    .btn:hover{transform:translateY(-1px);box-shadow:0 12px 24px rgba(1,30,65,.14)}
    .btn.blue{background:var(--blue)}
    .btn.terra{background:var(--terracotta)}
    .btn.light{background:#fff;color:var(--navy);border-color:var(--line)}
    .btn.ghost{background:transparent;color:var(--navy);border-color:var(--line)}
    .btn.danger{background:var(--danger)}
    .btn.success{background:var(--success)}
    .btn.small{min-height:34px;padding:8px 11px;border-radius:11px;font-size:12px}
    .btn:disabled{opacity:.46;cursor:not-allowed;transform:none;box-shadow:none}
    .form-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
    .field{display:flex;flex-direction:column;gap:7px;grid-column:span 6}
    .field.col-12{grid-column:span 12}
    .field.col-9{grid-column:span 9}
    .field.col-8{grid-column:span 8}
    .field.col-6{grid-column:span 6}
    .field.col-4{grid-column:span 4}
    .field.col-3{grid-column:span 3}
    .field label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:900;color:var(--navy)}
    .field label .req{color:var(--terracotta)}
    input,select,textarea{
      width:100%;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--ink);padding:12px 13px;
      outline:none;font-size:14px;line-height:1.35;transition:.12s ease
    }
    textarea{min-height:116px;resize:vertical}
    input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(0,130,203,.10)}
    .muted{color:var(--muted)}
    .section-hint{font-size:13px;color:var(--muted);line-height:1.55}
    .section-title{font-size:20px;color:var(--navy);font-weight:300;margin:0 0 8px}
    .section-title strong{font-weight:850}
    .divider{height:1px;background:var(--line);margin:20px 0}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff}
    table{width:100%;border-collapse:separate;border-spacing:0;min-width:900px}
    th,td{padding:13px 14px;border-bottom:1px solid var(--line);font-size:13px;text-align:left;vertical-align:top}
    th{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:900;background:#FBFAF7}
    tr:last-child td{border-bottom:0}
    .badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 9px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;border:1px solid var(--line);background:#fff;color:var(--navy)}
    .badge.blue{background:rgba(0,130,203,.10);color:#0067a2;border-color:rgba(0,130,203,.18)}
    .badge.terra{background:rgba(172,68,30,.10);color:var(--terracotta);border-color:rgba(172,68,30,.20)}
    .badge.success{background:rgba(17,107,77,.10);color:var(--success);border-color:rgba(17,107,77,.20)}
    .badge.danger{background:rgba(154,46,34,.10);color:var(--danger);border-color:rgba(154,46,34,.20)}
    .badge.muted{background:#f3f0eb;color:var(--muted)}
    .filterbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
    .filterbar input,.filterbar select{max-width:240px}
    .kanban{
      display:grid;grid-template-columns:repeat(7,minmax(238px,1fr));gap:14px;overflow:auto;padding-bottom:12px
    }
    .kanban-col{
      min-height:560px;background:rgba(255,255,255,.72);border:1px solid var(--line);border-radius:20px;padding:12px;
      box-shadow:0 12px 34px rgba(1,30,65,.06)
    }
    .kanban-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:8px 6px 12px}
    .kanban-title{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--navy);font-weight:900}
    .kanban-total{font-size:11px;color:var(--muted);margin-top:4px}
    .kanban-card{
      background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:10px;box-shadow:0 8px 24px rgba(1,30,65,.08);
      cursor:grab
    }
    .kanban-card:active{cursor:grabbing}
    .kanban-client{font-weight:850;color:var(--navy);font-size:14px;margin-bottom:5px}
    .kanban-type{font-size:12px;color:var(--muted);line-height:1.35}
    .kanban-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
    .empty-state{border:1px dashed var(--line-strong);border-radius:20px;padding:30px;text-align:center;background:rgba(255,255,255,.58)}
    .empty-state strong{display:block;color:var(--navy);font-size:18px;margin-bottom:6px}
    .empty-state span{color:var(--muted);font-size:14px;line-height:1.5}
    .chart-row{display:grid;grid-template-columns:150px 1fr 110px;align-items:center;gap:12px;margin:12px 0}
    .chart-label{font-size:13px;font-weight:800;color:var(--navy)}
    .chart-track{height:12px;border-radius:999px;background:#ece8e1;overflow:hidden}
    .chart-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--navy))}
    .chart-value{text-align:right;font-size:12px;color:var(--muted);font-weight:800}
    .toast{
      position:fixed;right:22px;bottom:22px;z-index:9999;display:grid;gap:10px
    }
    .toast-item{background:var(--navy);color:#fff;padding:14px 16px;border-radius:16px;box-shadow:var(--shadow);max-width:420px;font-size:13px;line-height:1.45}
    .toast-item.success{background:var(--success)}
    .toast-item.danger{background:var(--danger)}
    .toast-item.warn{background:var(--warning)}
    .modal-backdrop{position:fixed;inset:0;background:rgba(1,30,65,.58);z-index:1000;display:grid;place-items:center;padding:24px}
    .modal{width:min(860px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:26px;box-shadow:var(--shadow);padding:24px;border:1px solid rgba(255,255,255,.3)}
    .login-wrap{min-height:100vh;display:grid;grid-template-columns:1.1fr .9fr;background:var(--off)}
    .login-hero{background:linear-gradient(135deg,var(--navy),#052c58);color:#fff;padding:56px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between}
    .login-hero::before{content:"";position:absolute;inset:0;background:var(--login-pattern) center/680px auto repeat;opacity:.055}
    .login-hero > *{position:relative;z-index:1}
    .login-logo{height:42px;width:auto;filter:brightness(0) invert(1);margin-bottom:54px}
    .login-hero h1{font-size:52px;line-height:1.02;font-weight:250;margin:0;letter-spacing:-.03em}
    .login-hero h1 strong{font-weight:850;color:#fff}
    .login-hero p{font-size:17px;color:rgba(255,255,255,.72);line-height:1.6;max-width:640px}
    .login-panel{display:grid;place-items:center;padding:42px}
    .auth-card{width:min(520px,100%);background:#fff;border:1px solid var(--line);border-radius:30px;box-shadow:var(--shadow);padding:32px}
    .auth-card h2{margin:0 0 8px;color:var(--navy);font-size:28px;font-weight:300}
    .auth-card h2 strong{font-weight:850}
    .auth-card p{margin:0 0 22px;color:var(--muted);line-height:1.55}
    .two-actions{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
    .integration-box{border:1px solid var(--line);border-radius:18px;padding:16px;background:#fff}
    .codebox{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:#071a32;color:#cceaff;border-radius:16px;padding:16px;overflow:auto;font-size:12px;line-height:1.55;border:1px solid rgba(255,255,255,.1)}
    .subnav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
    .subnav .btn.active{background:var(--blue)}
    .proposal-toolbar{
      position:sticky;top:0;z-index:50;background:rgba(247,245,241,.92);backdrop-filter:blur(14px);
      border-bottom:1px solid var(--line);margin:-26px -30px 24px;padding:16px 30px;display:flex;justify-content:space-between;gap:16px;align-items:center
    }
    .proposal-stage{font-size:12px;color:var(--muted)}
    .proposal-stage strong{color:var(--navy)}
    .proposal-preview-bg{background:#dcd6ce;border-radius:26px;padding:28px;overflow:auto;border:1px solid var(--line)}
    .proposal-document{
      --doc-navy:#011E41;--doc-blue:#0082CB;--doc-terra:#AC441E;--doc-warm:#C4BEB6;--doc-off:#F7F5F1;
      color:#172136;font-family:var(--font);margin:0 auto;width:210mm;max-width:100%;
    }
    .proposal-page{
      width:210mm;min-height:297mm;background:#fff;margin:0 auto 18px;padding:20mm 18mm 18mm;
      box-shadow:0 16px 60px rgba(1,30,65,.20);position:relative;overflow:hidden;page-break-after:always;
    }
    .proposal-page:last-child{page-break-after:auto}
    .proposal-pattern{
      position:absolute;right:-68mm;top:-48mm;width:138mm;height:138mm;background:var(--doc-pattern) center/contain no-repeat;opacity:.045;pointer-events:none
    }
    .proposal-top{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:22mm;position:relative;z-index:1}
    .proposal-logo{height:16mm;width:auto;object-fit:contain}
    .proposal-doc-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--doc-blue);font-weight:900;text-align:right}
    .proposal-doc-number{font-size:11px;color:#6a7284;margin-top:4px;text-align:right}
    .proposal-cover-title{font-size:42px;line-height:.98;font-weight:250;letter-spacing:-.04em;color:var(--doc-navy);margin:0 0 9mm;max-width:150mm}
    .proposal-cover-title strong{font-weight:850}
    .proposal-headline{font-size:18px;line-height:1.35;color:#43506a;max-width:145mm;margin-bottom:14mm}
    .proposal-headline [contenteditable], .proposal-editable{outline:2px dashed transparent;border-radius:8px;transition:.12s ease}
    .proposal-editable:hover{outline-color:rgba(0,130,203,.22);background:rgba(0,130,203,.04)}
    .proposal-meta-card{
      display:grid;grid-template-columns:1.1fr .9fr;gap:10mm;background:var(--doc-off);border:1px solid rgba(1,30,65,.12);
      border-radius:14mm;padding:10mm;position:relative;z-index:1
    }
    .proposal-meta-card h3{margin:0 0 4mm;color:var(--doc-navy);font-size:12px;text-transform:uppercase;letter-spacing:.10em}
    .proposal-meta-card p{margin:0;color:#4d586f;font-size:12px;line-height:1.55}
    .proposal-info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4mm}
    .proposal-info-item{border-top:1px solid rgba(1,30,65,.13);padding-top:3mm}
    .proposal-info-item span{display:block;color:#6a7284;font-size:8px;text-transform:uppercase;letter-spacing:.10em;font-weight:900}
    .proposal-info-item strong{display:block;color:var(--doc-navy);font-size:12px;line-height:1.35;margin-top:1.5mm}
    .proposal-cover-footer{
      position:absolute;left:18mm;right:18mm;bottom:14mm;border-top:1px solid rgba(1,30,65,.14);padding-top:5mm;
      display:flex;justify-content:space-between;align-items:center;gap:10mm;color:#6a7284;font-size:10px;line-height:1.5
    }
    .proposal-cover-footer strong{color:var(--doc-navy)}
    .proposal-section{position:relative;z-index:1;margin-bottom:9mm;break-inside:avoid}
    .proposal-section h2{
      font-size:23px;line-height:1.08;margin:0 0 4mm;color:var(--doc-navy);font-weight:300;letter-spacing:-.02em;
      display:flex;align-items:center;gap:4mm
    }
    .proposal-section h2 strong{font-weight:850}
    .proposal-section h2::before{content:"";width:9px;height:22px;border-radius:999px;background:var(--doc-blue);display:inline-block;flex:0 0 auto}
    .proposal-rich{font-size:12.6px;line-height:1.62;color:#33405a}
    .proposal-rich p{margin:0 0 3.6mm}
    .proposal-rich ul{margin:0 0 3mm 0;padding:0;list-style:none}
    .proposal-rich li{position:relative;margin:0 0 2.2mm;padding-left:6mm}
    .proposal-rich li::before{content:"";position:absolute;left:0;top:.56em;width:6px;height:6px;border-radius:50%;background:var(--doc-terra)}
    .proposal-split{display:grid;grid-template-columns:1fr 1fr;gap:8mm}
    .proposal-invest-card{
      border:1px solid rgba(1,30,65,.13);border-radius:10mm;padding:8mm;background:linear-gradient(180deg,#fff,#fbfaf7);break-inside:avoid
    }
    .proposal-invest-card h3{margin:0 0 5mm;color:var(--doc-navy);font-size:11px;text-transform:uppercase;letter-spacing:.10em}
    .price-line{display:flex;justify-content:space-between;gap:10mm;border-bottom:1px solid rgba(1,30,65,.12);padding:3mm 0;font-size:12px;color:#4d586f}
    .price-line:last-child{border-bottom:0}
    .price-line strong{font-size:15px;color:var(--doc-navy)}
    .acceptance-box{
      border:1px solid rgba(172,68,30,.22);background:rgba(172,68,30,.055);border-radius:10mm;padding:7mm;break-inside:avoid
    }
    .acceptance-box h3{margin:0 0 3mm;color:var(--doc-terra);font-size:13px;text-transform:uppercase;letter-spacing:.08em}
    .acceptance-box p{margin:0;color:#4d586f;font-size:12px;line-height:1.55}
    .proposal-footer{
      position:absolute;left:18mm;right:18mm;bottom:10mm;border-top:1px solid rgba(1,30,65,.12);padding-top:3.6mm;
      color:#6a7284;font-size:9px;line-height:1.35;display:flex;justify-content:space-between;gap:8mm
    }
    .public-topbar{position:sticky;top:0;z-index:80;background:rgba(255,255,255,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);padding:14px 22px;display:flex;justify-content:space-between;gap:14px;align-items:center}
    .public-accept-panel{position:fixed;right:22px;bottom:22px;z-index:90;width:min(430px,calc(100vw - 44px));background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:18px}
    .public-accept-panel h3{margin:0 0 6px;color:var(--navy);font-weight:850}
    .public-accept-panel p{margin:0 0 12px;color:var(--muted);font-size:13px;line-height:1.45}
    .audit-list{display:grid;gap:10px}
    .audit-item{border:1px solid var(--line);border-radius:15px;padding:12px;background:#fff;font-size:13px}
    .audit-item strong{color:var(--navy)}
    .audit-item span{color:var(--muted);display:block;margin-top:4px;font-size:12px}
    @media (max-width:1180px){
      .app-shell{grid-template-columns:1fr}
      .sidebar{position:relative;height:auto}
      .main{padding:22px}
      .kanban{grid-template-columns:repeat(7,260px)}
      .grid.cols-4{grid-template-columns:repeat(2,1fr)}
      .login-wrap{grid-template-columns:1fr}
      .login-hero{min-height:420px}
    }
    @media (max-width:760px){
      .grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr}
      .form-grid{grid-template-columns:1fr}
      .field,.field.col-12,.field.col-9,.field.col-8,.field.col-6,.field.col-4,.field.col-3{grid-column:span 1}
      .topbar{align-items:flex-start;flex-direction:column}
      .page-title{font-size:28px}
      .proposal-toolbar{margin:-22px -22px 18px;padding:14px 22px;align-items:flex-start;flex-direction:column}
      .login-hero h1{font-size:38px}
      .proposal-meta-card,.proposal-split{grid-template-columns:1fr}

    const ORA_DEFAULT_TEMPLATES = [{"id": "assessoria-contabil", "name": "Proposta de Assessoria Contábil", "category": "Assessoria recorrente", "headline": "Assessoria contábil para decisões empresariais mais seguras.", "context": "Empresas em crescimento precisam de uma rotina contábil organizada, previsível e conectada à gestão. Esta proposta estrutura a assessoria contábil da ORA com foco em conformidade, clareza de números e apoio à tomada de decisão.", "objective": "Assumir a rotina contábil, fiscal e consultiva recorrente do cliente, com organização documental, apuração técnica, entrega de obrigações e apoio gerencial para decisões mais seguras.", "scope": "- Diagnóstico inicial da situação contábil, fiscal e cadastral da empresa.\n- Organização do fluxo mensal de documentos, informações financeiras e responsabilidades.\n- Escrituração contábil e fiscal conforme regime tributário, atividade e documentos disponibilizados.\n- Apuração de tributos e geração das guias aplicáveis dentro do escopo contratado.\n- Entrega das obrigações acessórias recorrentes compatíveis com a atividade da empresa.\n- Conciliação contábil com base nas informações financeiras enviadas pelo cliente.\n- Emissão de balancetes, relatórios gerenciais e demonstrativos periódicos.\n- Reuniões de acompanhamento para leitura dos números e orientação estratégica.\n- Suporte consultivo para dúvidas contábeis, fiscais e rotinas administrativas relacionadas ao escopo.", "deliverables": "- Cronograma de implantação e checklist documental.\n- Relatórios contábeis e fiscais periódicos.\n- Guias de tributos e demonstrativos de apuração.\n- Obrigações acessórias transmitidas, quando aplicável.\n- Relatório executivo de acompanhamento e recomendações.", "outOfScope": "- Auditoria independente.\n- Recuperação tributária ou tese fiscal específica.\n- Consultoria societária extraordinária.\n- Defesa administrativa ou judicial.\n- Serviços financeiros operacionais não previstos no contrato.", "clientResponsibilities": "- Enviar documentos dentro dos prazos acordados.\n- Manter acessos, certificados e cadastros atualizados.\n- Informar alterações societárias, operacionais e contratuais relevantes.\n- Validar informações financeiras e documentos fornecidos.\n- Efetuar pagamentos de tributos, taxas e honorários nos prazos.", "timeline": "Implantação inicial em até 30 dias após contratação e recebimento dos documentos. Rotina mensal conforme calendário operacional e fiscal acordado entre as partes.", "assumptions": "A execução considera disponibilidade de documentos, acessos e informações completas. Demandas fora do escopo serão avaliadas tecnicamente e poderão gerar proposta complementar.", "commercialConditions": "Honorários mensais conforme investimento apresentado nesta proposta. Condições de pagamento e reajuste seguem os termos comerciais acordados entre as partes.", "legalNotes": "A assessoria contábil será realizada com base na legislação vigente, nas informações disponibilizadas pelo cliente e nos limites técnicos do escopo contratado."}, {"id": "assessoria-contabil-reforma", "name": "Proposta de Assessoria Contábil da Reforma Tributária", "category": "Reforma Tributária", "headline": "Preparação contábil para a transição tributária.", "context": "A Reforma Tributária altera a forma de análise, apuração, crédito e controle das operações. Empresas precisam revisar processos, dados e impactos para atravessar a transição com governança.", "objective": "Apoiar a empresa na adaptação contábil e fiscal à Reforma Tributária, com diagnóstico técnico, leitura de impacto, plano de transição e acompanhamento das mudanças aplicáveis.", "scope": "- Levantamento inicial das operações, receitas, custos, créditos, regimes e documentos fiscais.\n- Mapeamento de processos impactados pela transição para CBS, IBS e demais ajustes normativos.\n- Análise preliminar de impactos contábeis, fiscais e operacionais.\n- Revisão dos cadastros fiscais, NCM, serviços, regras de crédito e parametrizações relevantes.\n- Orientação sobre controles internos necessários para a transição.\n- Apoio na construção de matriz de riscos e oportunidades, sem promessa de economia.\n- Acompanhamento das atualizações normativas aplicáveis ao cliente.\n- Reuniões executivas para alinhamento do plano de ação.\n- Relatório de recomendações para tomada de decisão.", "deliverables": "- Diagnóstico de prontidão para Reforma Tributária.\n- Matriz de impactos e pontos de atenção.\n- Plano de transição com prioridades.\n- Relatório executivo para gestão.\n- Reuniões de acompanhamento técnico.", "outOfScope": "- Implementação sistêmica em ERP de terceiros.\n- Parecer jurídico formal.\n- Defesa administrativa ou judicial.\n- Revisão de operações não disponibilizadas.\n- Garantia de redução de carga tributária.", "clientResponsibilities": "- Disponibilizar documentos fiscais, relatórios e acessos necessários.\n- Indicar responsáveis internos por fiscal, financeiro, compras, vendas e TI.\n- Validar processos operacionais mapeados.\n- Executar ajustes internos sob sua responsabilidade.", "timeline": "Diagnóstico inicial em até 45 dias, conforme volume documental. Acompanhamento recorrente conforme cronograma contratado.", "assumptions": "A análise considera legislação vigente e normas publicadas até a data dos trabalhos. Alterações posteriores poderão demandar revisão técnica.", "commercialConditions": "Investimento composto por fase de diagnóstico e/ou mensalidade de acompanhamento, conforme composição comercial cadastrada.", "legalNotes": "O trabalho tem natureza técnica e consultiva, sem garantia de resultado tributário específico ou eliminação absoluta de risco fiscal."}, {"id": "assessoria-contabil-compete", "name": "Proposta de Assessoria Contábil com COMPETE", "category": "COMPETE", "headline": "Assessoria contábil com gestão técnica do COMPETE.", "context": "Empresas enquadradas ou interessadas no COMPETE precisam alinhar rotina contábil, fiscal, documental e obrigações específicas para manter conformidade e reduzir exposição operacional.", "objective": "Prestar assessoria contábil recorrente com acompanhamento das condições, controles e obrigações relacionadas ao COMPETE, conforme legislação e enquadramento aplicável.", "scope": "- Diagnóstico do enquadramento e das operações vinculadas ao COMPETE.\n- Organização da rotina contábil e fiscal considerando benefícios, controles e obrigações acessórias.\n- Apuração e conferência dos tributos conforme regime e enquadramento informado.\n- Monitoramento documental das operações beneficiadas.\n- Apoio na manutenção de cadastros, relatórios e evidências exigidas.\n- Orientação sobre riscos de desenquadramento, inconsistências e pontos de atenção.\n- Entrega de relatórios periódicos de acompanhamento.\n- Reuniões técnicas para análise de indicadores fiscais e operacionais.", "deliverables": "- Checklist de aderência ao COMPETE.\n- Relatório de acompanhamento fiscal.\n- Guias e demonstrativos aplicáveis.\n- Dossiê documental mensal quando previsto.\n- Orientações técnicas para manutenção da conformidade.", "outOfScope": "- Pedido inicial de adesão quando não contratado.\n- Defesa contra autos de infração.\n- Parecer jurídico.\n- Revisão retroativa ampla sem contratação específica.\n- Atividades operacionais internas do cliente.", "clientResponsibilities": "- Manter operações compatíveis com o enquadramento.\n- Enviar documentos fiscais e financeiros em prazo hábil.\n- Comunicar mudanças de produtos, fornecedores, clientes, operações e regime.\n- Validar relatórios e implementar controles internos recomendados.", "timeline": "Implantação da rotina em até 30 dias após acesso às informações. Acompanhamento mensal conforme calendário fiscal.", "assumptions": "A manutenção do enquadramento depende também da conduta operacional e documental do cliente. A ORA atuará com orientação técnica dentro do escopo contratado.", "commercialConditions": "Honorários definidos conforme volume operacional, complexida       async function loadAll(){
        const localUsers = load(KEYS.users, []);
        const localProposals = load(KEYS.proposals, []);
        const localTemplates = load(KEYS.templates, []);
        const localSettings = load(KEYS.settings, {});
        const localAudit = load(KEYS.audit, []);
        try {
          const res = await fetch(`${API_URL}/init`);
          if(!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          const apiUsers = data.users || [];
          const apiProposals = data.proposals || [];
          const apiTemplates = data.templates || [];
          const apiSettings = data.settings || {};
          const apiAudit = data.audit || [];
          const useLocalUsers = !apiUsers.length && localUsers.length;
          const useLocalProposals = !apiProposals.length && localProposals.length;
          const useLocalTemplates = !apiTemplates.length && localTemplates.length;
          const useLocalSettings = !Object.keys(apiSettings).length && Object.keys(localSettings).length;
          const useLocalAudit = !apiAudit.length && localAudit.length;

          state.users = useLocalUsers ? localUsers : apiUsers;
          state.proposals = (useLocalProposals ? localProposals : apiProposals).map(normalizeProposal);
          state.templates = mergeTemplates(useLocalTemplates ? localTemplates : apiTemplates);
          state.settings = deepMerge(structuredClone(defaultSettings), useLocalSettings ? localSettings : apiSettings);
          state.audit = useLocalAudit ? localAudit : apiAudit;
          persist();

          if(useLocalUsers || useLocalProposals || useLocalTemplates || useLocalSettings){
            syncLocalCacheToApi().catch(e => console.warn('Não foi possível reidratar a API com o cache local.', e));
          }
        } catch(e) {
          console.warn("API Offline. Usando cache local localStorage como fallback.", e);
          state.users = localUsers;
          state.proposals = localProposals.map(normalizeProposal);
          state.templates = mergeTemplates(localTemplates);
          state.settings = deepMerge(structuredClone(defaultSettings), localSettings);
          state.audit = localAudit;
        }
      }
      function load(key, fallback){
        try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }catch(e){ return fallback; }
      }
      function save(key, data){ localStorage.setItem(key, JSON.stringify(data)); }
      function persist(){
        save(KEYS.users, state.users);

      function normalizeProposal(p){
        if(!p || typeof p !== 'object') return p;
        const acceptance = p.dados_aceite || {};
        const approved = p.stage === 'aprovada' || p.status === 'Aprovada' || p.etapa === 'Aprovada' || !!p.acceptedAt || !!p.dados_aceite;
        if(approved){
          p.stage = 'aprovada';
          p.status = 'Aprovada';
          p.etapa = 'Aprovada';
          p.probability = 100;
          p.acceptedAt = p.acceptedAt || acceptance.acceptedAt || new Date().toISOString();
          p.acceptedBy = p.acceptedBy || acceptance.acceptedBy || '';
          p.acceptanceProtocol = p.acceptanceProtocol || acceptance.protocol || '';
          p.acceptanceDocument = p.acceptanceDocument || acceptance.document || '';
        }
        return p;
      }
      function acceptanceEndpoint(){
        return state.settings?.email?.acceptanceEndpoint || `${API_URL}/proposals/aceitar`;

      async function postAcceptance(payload){
        const endpoint = acceptanceEndpoint();
        if(!endpoint) return null;
        try{
          const res = await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
          if(!res.ok) throw new Error(`HTTP ${res.status}`);
          return await res.json().catch(()=>({status:'success'}));
        }catch(e){
          console.warn('Falha ao enviar aceite para a API.', e);
          return null;
        }
      }
      function applyAcceptedProposal(id,payload,serverProposal=null){
        const p = state.proposals.find(x=>x.id===id);

        if(serverProposal && typeof serverProposal === 'object') Object.assign(p, serverProposal);
        p.stage = 'aprovada';
        p.status = 'Aprovada';
        p.etapa = 'Aprovada';
        p.probability = 100;
        p.acceptedAt = payload.acceptedAt || p.acceptedAt || new Date().toISOString();
        p.acceptedBy = payload.acceptedBy || p.acceptedBy || '';
        p.acceptanceProtocol = payload.protocol || p.acceptanceProtocol || '';
        p.acceptanceDocument = payload.document || p.acceptanceDocument || '';
        p.dados_aceite = payload;
        p.updatedAt = new Date().toISOString();
        save(KEYS.proposals,state.proposals);
        return p;
      }
      async function syncLocalCacheToApi(){
        const jobs = [];
        state.users.forEach(u => jobs.push(fetch(`${API_URL}/users`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(u)})));
        state.proposals.forEach(p => jobs.push(fetch(`${API_URL}/proposals`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(p)})));
        state.templates.filter(t => !t.system).forEach(t => jobs.push(fetch(`${API_URL}/templates`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(t)})));
        if(state.settings) jobs.push(fetch(`${API_URL}/settings`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(state.settings)}));
        if(jobs.length) await Promise.allSettled(jobs);

      function deepMerge(target, source){
        if(!source || typeof source !== 'object') return target;
        Object.keys(source).forEach(k=>{
          if(source[k] && typeof source[k] === 'object' && !Array.isArray(source[k])){
            target[k] = deepMerge(target[k] || {}, source[k]);
          }else target[k] = source[k];
        });
        return target;
      }

      function simpleHash(str){
        let h = 0x811c9dc5;
        for(let i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h += (h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24); }
        return ('00000000'+(h>>>0).toString(16)).slice(-8);
      }
      function utf8Bytes(str){
        if(window.TextEncoder) return Array.from(new TextEncoder().encode(str));
        const utf8 = unescape(encodeURIComponent(str));
        return Array.from(utf8).map(c=>c.charCodeAt(0));
      }
      function sha256HexFallback(str){
        const K = [
          0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
          0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
          0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
          0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
          0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
          0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
          0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
          0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
        ];
        const rotr = (x,n) => (x >>> n) | (x << (32 - n));
        const bytes = utf8Bytes(str);
        const bitLen = bytes.length * 8;
        bytes.push(0x80);
        while(bytes.length % 64 !== 56) bytes.push(0);
        const hi = Math.floor(bitLen / 0x100000000);
        const lo = bitLen >>> 0;
        bytes.push((hi>>>24)&255,(hi>>>16)&255,(hi>>>8)&255,hi&255,(lo>>>24)&255,(lo>>>16)&255,(lo>>>8)&255,lo&255);
        let h0=0x6a09e667,h1=0xbb67ae85,h2=0x3c6ef372,h3=0xa54ff53a,h4=0x510e527f,h5=0x9b05688c,h6=0x1f83d9ab,h7=0x5be0cd19;
        const w = new Array(64);
        for(let i=0;i<bytes.length;i+=64){
          for(let j=0;j<16;j++){
            const k=i+j*4;
            w[j]=((bytes[k]<<24)|(bytes[k+1]<<16)|(bytes[k+2]<<8)|bytes[k+3])>>>0;
          }
          for(let j=16;j<64;j++){
            const s0=(rotr(w[j-15],7)^rotr(w[j-15],18)^(w[j-15]>>>3))>>>0;
            const s1=(rotr(w[j-2],17)^rotr(w[j-2],19)^(w[j-2]>>>10))>>>0;
            w[j]=(w[j-16]+s0+w[j-7]+s1)>>>0;
          }
          let a=h0,b=h1,c=h2,d=h3,e=h4,f=h5,g=h6,h=h7;
          for(let j=0;j<64;j++){
            const S1=(rotr(e,6)^rotr(e,11)^rotr(e,25))>>>0;
            const ch=((e&f)^((~e)&g))>>>0;
            const temp1=(h+S1+ch+K[j]+w[j])>>>0;
            const S0=(rotr(a,2)^rotr(a,13)^rotr(a,22))>>>0;
            const maj=((a&b)^(a&c)^(b&c))>>>0;
            const temp2=(S0+maj)>>>0;
            h=g; g=f; f=e; e=(d+temp1)>>>0; d=c; c=b; b=a; a=(temp1+temp2)>>>0;
          }
          h0=(h0+a)>>>0; h1=(h1+b)>>>0; h2=(h2+c)>>>0; h3=(h3+d)>>>0; h4=(h4+e)>>>0; h5=(h5+f)>>>0; h6=(h6+g)>>>0; h7=(h7+h)>>>0;
        }
        return [h0,h1,h2,h3,h4,h5,h6,h7].map(h=>h.toString(16).padStart(8,'0')).join('');
      }
      async function digestPassword(password, salt){
        const data = `${salt}|${password}`;
        if(window.crypto?.subtle){
          try{
            const enc = new TextEncoder().encode(data);
            const digest = await crypto.subtle.digest('SHA-256', enc);
            return Array.from(new Uint8Array(digest)).map(b=>b.toString(16).padStart(2,'0')).join('');
          }catch(e){
            console.warn('WebCrypto indisponível. Usando SHA-256 em JavaScript.', e);
          }
        }
        return sha256HexFallback(data);
      }
      function legacyDigestPassword(password, salt){
        return `fallback_${simpleHash(`${salt}|${password}`)}`;
      }
      function randomSalt(){
        if(window.crypto?.getRandomValues){
          const arr = new Uint8Array(12); crypto.getRandomValues(arr);
          return Array.from(arr).map(b=>b.toString(16).padStart(2,'0')).join('');
        }
        return Math.random().toString(36).slice(2) + Date.now().toString(36);
      }

      async function createAdmin(event){

        const user = {
          id:uid('user'),
          name:fd.get('name').trim(),
          email:fd.get('email').trim().toLowerCase(),
          role:'admin',
          active:true,
          seller:true,
          salt,

        fetch(`${API_URL}/users`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(user)}).catch(console.error);

      async function login(event){
        event.preventDefault();
        const fd = new FormData(event.target);
        const email = fd.get('email').trim().toLowerCase();
        const password = fd.get('password');
        const users = state.users.filter(u => u.email === email && u.active !== false);
        if(!users.length){ toast('Usuário não encontrado ou inativo.','danger'); return; }

        // Pode existir mais de um cadastro com o mesmo e-mail depois dos testes/redeploys.
        // Neste caso, tenta a senha em todos e entra no cadastro que bater.
        let user = null;
        let migratedHash = null;
        for(const candidate of users){
          const salt = candidate.salt || '';
          const hash = await digestPassword(password, salt);
          const legacyHash = legacyDigestPassword(password, salt);
          if(hash === candidate.passHash || legacyHash === candidate.passHash){
            user = candidate;
            if(legacyHash === candidate.passHash && hash !== legacyHash) migratedHash = hash;
            break;
          }
        }
        if(!user){ toast('Senha inválida.','danger'); return; }
        if(migratedHash){
          user.passHash = migratedHash;
          fetch(`${API_URL}/users`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(user)}).catch(console.error);
          persist();
        }

        state.user = user;
        sessionStorage.setItem(KEYS.session,user.id);
        audit('login', null, 'Acesso ao sistema');
        renderShell();
      }

              ${navBtn('proposals','▤','Propostas')}
              ${navBtn('proposal-form','＋','Nova proposta', 'new')}
              <div class="nav-group-label">Governança</div>
              ${navBtn('templates','◎','Modelos de proposta')}
              ${navBtn('integrations','⇄','Integrações')}
              ${navBtn('settings','⚙','Configurações')}
              ${currentUserCan('admin') ? navBtn('users','◉','Usuários') : ''}
              <div class="sidebar-foot">
                <strong>${esc(state.settings.organization.name)}</strong>
                <span>${esc(state.settings.organization.tagline)}<br>Visual premium, proposta comercial e controle do pipeline.</span>

            </aside>
            <main class="main">
              ${renderTopbar()}
              <div id="view">${renderView()}</div>
            </main>
          </div>`;
      }
      function navBtn(route, icon, label, param=null){
        const active = state.route === route && (param === null || state.param === param);
        return `<button class="nav-btn ${active?'active':''}" onclick="ORA.go('${route}', ${param?`'${param}'`:'null'})"><span class="nav-icon">${icon}</span><span>${label}</span></button>`;
      }
      function renderTopbar(){
        const titles = {
          dashboard:['Dashboard comercial','Visão consolidada do pipeline, propostas, valores e próximos movimentos.'],
          kanban:['CRM Kanban','Arraste as oportunidades entre etapas e acompanhe o avanço comercial.'],
          proposals:['Propostas','Lista de propostas cadastradas, filtros, edição, envio e geração de HTML imprimível.'],
          'proposal-form':[state.param && state.param !== 'new' ? 'Editar proposta' : 'Nova proposta','Cadastro completo com campos obrigatórios para emissão comercial profissional.'],
          templates:['Modelos de proposta','Crie, edite e padronize modelos por tipo de serviço.'],
          integrations:['Integrações','Ambiente para API Athenas Online, importação, consulta, atualização e envio de informações.'],
          settings:['Configurações','Marca, e-mail, aceite digital e parâmetros de integração.'],
          users:['Usuários','Cadastro de usuários, vendedores e perfis de acesso.'],
          preview:['Prévia imprimível','Proposta comercial em HTML, editável antes da impressão e do envio.']
        };
        const [title, sub] = titles[state.route] || titles.dashboard;
        return `
          <div class="topbar">
            <div>
              <div class="page-kicker">Grupo ORA</div>
              <h1 class="page-title">${title.split(' ')[0]} <strong>${title.split(' ').slice(1).join(' ')}</strong></h1>
              <p class="page-sub">${sub}</p>
            </div>
            <div class="user-chip">
              <div class="avatar">${esc(initials(state.user?.name))}</div>
              <div class="user-meta"><strong>${esc(state.user?.name)}</strong>${esc(roleLabel(state.user?.role))}</div>
              <button class="btn light small" onclick="ORA.logout()">Sair</button>
            </div>
          </div>`;
      }
      function go(route, param=null){
        state.route = route;
        state.param = param;
        renderShell();
      }
      function renderView(){
        if(state.route === 'dashboard') return renderDashboard();
        if(state.route === 'kanban') return renderKanban();
        if(state.route === 'proposals') return renderProposals();
        if(state.route === 'proposal-form') return renderProposalForm(state.param);
        if(state.route === 'templates') return renderTemplates();
        if(state.route === 'integrations') return renderIntegrations();
        if(state.route === 'settings') return renderSettings();
        if(state.route === 'users') return renderUsers();
        if(state.route === 'preview') return renderPreview(state.param);
        return renderDashboard();
      }

      function getProposalValue(p){ return num(p.valueTotal) || num(p.valueSetup) + (num(p.valueMonthly) * 12); }
      function filteredProposals(){
        const q = state.filters.q?.toLowerCase() || '';
        return state.proposals.filter(p=>{
          const t = templateById(p.typeId)?.name || '';
          const okQ = !q || [p.clientName,p.cnpj,p.contactName,p.sellerName,p.indicatedBy,t].join(' ').toLowerCase().includes(q);
          const okStage = !state.filters.stage || p.stage === state.filters.stage;
          const okType = !state.filters.type || p.typeId === state.filters.type;
          return okQ && okStage && okType;
        }).sort((a,b)=>new Date(b.updatedAt||b.createdAt)-new Date(a.updatedAt||a.createdAt));
      }
      function renderDashboard(){
        const active = state.proposals.filter(p=>!['perdida'].includes(p.stage));
        const total = state.proposals.length;
        const base = active.reduce((s,p)=>s+getProposalValue(p),0);
        const weighted = active.reduce((s,p)=>s+getProposalValue(p)*((Number(p.probability ?? stageById(p.stage).prob)||0)/100),0);
        const approved = state.proposals.filter(p=>p.stage==='aprovada');
        const approvedTotal = approved.reduce((s,p)=>s+getProposalValue(p),0);
        const avg = total ? base / Math.max(active.length,1) : 0;
        return `
          <div class="grid cols-4">
            ${metricCard('Propostas cadastradas', `<strong>${total}</strong>`, 'Quantidade total na base comercial.')}
            ${metricCard('Pipeline ponderado', `<strong>${money(weighted)}</strong>`, 'Valor ajustado por probabilidade de etapa.','dark')}
            ${metricCard('Valor em base', `<strong>${money(base)}</strong>`, 'Soma das propostas ativas, exceto perdidas.')}
            ${metricCard('Aprovadas', `<strong>${approved.length}</strong>`, `${money(approvedTotal)} em propostas aprovadas.`)}
          </div>
          <div class="grid cols-2" style="margin-top:18px">
            <div class="card clean">
              <h2 class="section-title">Funil <strong>comercial</strong></h2>
              <p class="section-hint">Distribuição das propostas por etapa do CRM.</p>
              <div class="divider"></div>
              ${renderStageChart()}
            </div>
            <div class="card clean">
              <h2 class="section-title">Distribuição por <strong>modelo</strong></h2>
              <p class="section-hint">Tipos de proposta com maior participação no pipeline.</p>
              <div class="divider"></div>
              ${renderTypeChart()}
            </div>
          </div>
          <div class="grid cols-2" style="margin-top:18px">
            <div class="card clean">
              <h2 class="section-title">Próximos <strong>movimentos</strong></h2>
              <p class="section-hint">Ações comerciais com data informada.</p>
              <div class="divider"></div>
              ${renderNextActions()}
            </div>
            <div class="card clean">
              <h2 class="section-title">Governança do <strong>pipeline</strong></h2>
              <p class="section-hint">Ticket médio ativo: <strong>${money(avg)}</strong>. Mantenha vendedor, indicação e próxima ação preenchidos para melhorar previsibilidade.</p>
              <div class="divider"></div>
              <div class="actions">
                <button class="btn blue" onclick="ORA.go('proposal-form','new')">Cadastrar proposta</button>
                <button class="btn light" onclick="ORA.go('kanban')">Abrir kanban</button>
                <button class="btn light" onclick="ORA.exportBackup()">Exportar backup JSON</button>
              </div>
            </div>
          </div>`;
      }
      function metricCard(label,value,micro,mode=''){
        return `<div class="card metric ${mode}"><div class="label">${label}</div><div class="value">${value}</div><div class="micro">${micro}</div></div>`;
      }
      function renderStageChart(){
        const max = Math.max(...stages.map(s=>state.proposals.filter(p=>p.stage===s.id).length),1);
        return stages.map(s=>{
          const count = state.proposals.filter(p=>p.stage===s.id).length;
          const total = state.proposals.filter(p=>p.stage===s.id).reduce((sum,p)=>sum+getProposalValue(p),0);
          return `<div class="chart-row"><div class="chart-label">${s.name}</div><div class="chart-track"><div class="chart-fill" style="width:${(count/max)*100}%"></div></div><div class="chart-value">${count} | ${money(total)}</div></div>`;
        }).join('') || `<div class="empty-state"><strong>Sem propostas</strong><span>Cadastre a primeira proposta para visualizar o funil.</span></div>`;
      }
      function renderTypeChart(){
        const groups = {};
        state.proposals.forEach(p=>{
          const name = templateById(p.typeId)?.name || 'Sem modelo';
          groups[name] = (groups[name] || 0) + getProposalValue(p);
        });
        const entries = Object.entries(groups).sort((a,b)=>b[1]-a[1]).slice(0,8);
        const max = Math.max(...entries.map(e=>e[1]),1);
        if(!entries.length) return `<div class="empty-state"><strong>Sem dados</strong><span>Os modelos aparecerão quando houver propostas cadastradas.</span></div>`;
        return entries.map(([name,total])=>`<div class="chart-row"><div class="chart-label">${esc(name)}</div><div class="chart-track"><div class="chart-fill" style="width:${(total/max)*100}%"></div></div><div class="chart-value">${money(total)}</div></div>`).join('');
      }
      function renderNextActions(){
        const list = state.proposals
          .filter(p=>p.nextActionDate && !['aprovada','perdida'].includes(p.stage))
          .sort((a,b)=>new Date(a.nextActionDate)-new Date(b.nextActionDate))
          .slice(0,8);
        if(!list.length) return `<div class="empty-state"><strong>Nenhuma próxima ação</strong><span>Inclua próxima ação no cadastro para acompanhar follow-ups.</span></div>`;
        return `<div class="audit-list">${list.map(p=>`
          <div class="audit-item">
            <strong>${esc(p.clientName)}</strong> — ${esc(p.nextAction || 'Próxima ação comercial')}
            <span>${brDate(p.nextActionDate)} • ${esc(p.sellerName || 'Sem vendedor')} • ${esc(stageById(p.stage).name)}</span>
          </div>`).join('')}</div>`;
      }

      function renderProposals(){
        const list = filteredProposals();
        return `
          <div class="card clean">
            <div class="two-actions">
              <div>
                <h2 class="section-title">Base de <strong>propostas</strong></h2>
                <p class="section-hint">Busque, edite, gere HTML imprimível, envie e acompanhe status comercial.</p>
              </div>
              <div class="actions">
                <button class="btn blue" onclick="ORA.go('proposal-form','new')">Nova proposta</button>
                <button class="btn light" onclick="ORA.exportBackup()">Backup</button>
              </div>
            </div>
            <div class="divider"></div>
            <div class="filterbar">
              <input placeholder="Buscar cliente, CNPJ, vendedor..." value="${attr(state.filters.q)}" oninput="ORA.setFilter('q', this.value)">
              <select onchange="ORA.setFilter('stage', this.value)">
                <option value="">Todas as etapas</option>${stages.map(s=>`<option value="${s.id}" ${state.filters.stage===s.id?'selected':''}>${s.name}</option>`).join('')}
              </select>
              <select onchange="ORA.setFilter('type', this.value)">
                <option value="">Todos os modelos</option>${state.templates.map(t=>`<option value="${t.id}" ${state.filters.type===t.id?'selected':''}>${esc(t.name)}</option>`).join('')}
              </select>
            </div>
            ${list.length ? proposalTable(list) : `<div class="empty-state"><strong>Nenhuma proposta encontrada</strong><span>Cadastre uma nova proposta ou ajuste os filtros.</span></div>`}
          </div>`;
      }
      function proposalTable(list){
        return `<div class="table-wrap"><table>
          <thead><tr><th>Nº</th><th>Cliente</th><th>Modelo</th><th>Vendedor / indicação</th><th>Valor</th><th>Etapa</th><th>Próxima ação</th><th>Ações</th></tr></thead>
          <tbody>${list.map(p=>`
            <tr>
              <td>${esc(p.proposalNumber || '—')}</td>
              <td><strong>${esc(p.clientName)}</strong><br><span class="muted">${esc(p.cnpj || '')} • ${esc(p.contactEmail || '')}</span></td>
              <td>${esc(templateById(p.typeId)?.name || '—')}</td>
              <td>${esc(p.sellerName || '—')}<br><span class="muted">Indicação: ${esc(p.indicatedBy || '—')}</span></td>
              <td><strong>${money(getProposalValue(p))}</strong></td>
              <td><span class="badge ${stageById(p.stage).tone}">${stageById(p.stage).name}</span>${p.acceptedAt ? `<br><span class="muted">Aceite: ${esc(p.acceptedBy || '—')} • ${brDate(p.acceptedAt)}</span>${p.acceptanceProtocol ? `<br><span class="muted">${esc(p.acceptanceProtocol)}</span>` : ''}` : ''}</td>
              <td>${esc(p.nextAction || '—')}<br><span class="muted">${brDate(p.nextActionDate)}</span></td>
              <td>
                <div class="actions">
                  <button class="btn light small" onclick="ORA.go('proposal-form','${p.id}')">Editar</button>
                  <button class="btn blue small" onclick="ORA.openPreview('${p.id}')">HTML/PDF</button>
                  <button class="btn light small" onclick="ORA.openEmailModal('${p.id}')">E-mail</button>
                  <button class="btn light small" onclick="ORA.duplicateProposal('${p.id}')">Duplicar</button>
                </div>
              </td>
            </tr>`).join('')}
          </tbody>
        </table></div>`;
      }
      function setFilter(field,value){ state.filters[field]=value; document.getElementById('view').innerHTML = renderProposals(); }

      function renderKanban(){
        const totals = {};
        stages.forEach(s=>totals[s.id] = state.proposals.filter(p=>p.stage===s.id).reduce((sum,p)=>sum+getProposalValue(p),0));
        return `
          <div class="card clean">
            <div class="two-actions">
              <div>
                <h2 class="section-title">CRM <strong>Kanban</strong></h2>
                <p class="section-hint">Arraste os cards para avançar as etapas. A probabilidade é ajustada automaticamente e registrada no histórico.</p>
              </div>
              <button class="btn blue" onclick="ORA.go('proposal-form','new')">Nova proposta</button>
            </div>
          </div>
          <div class="kanban" style="margin-top:18px">
            ${stages.map(stage=>`
              <section class="kanban-col" ondragover="ORA.allowDrop(event)" ondrop="ORA.dropProposal(event,'${stage.id}')">
                <div class="kanban-head">
                  <div><div class="kanban-title">${stage.name}</div><div class="kanban-total">${money(totals[stage.id] || 0)}</div></div>
                  <span class="badge ${stage.tone}">${stage.prob}%</span>
                </div>
                ${state.proposals.filter(p=>p.stage===stage.id).sort((a,b)=>new Date(b.updatedAt||b.createdAt)-new Date(a.updatedAt||a.createdAt)).map(p=>kanbanCard(p)).join('') || `<div class="section-hint" style="padding:10px">Sem propostas nesta etapa.</div>`}
              </section>`).join('')}
          </div>`;
      }
      function kanbanCard(p){
        return `<article class="kanban-card" draggable="true" ondragstart="ORA.dragProposal(event,'${p.id}')" ondblclick="ORA.go('proposal-form','${p.id}')">
          <div class="kanban-client">${esc(p.clientName)}</div>
          <div class="kanban-type">${esc(templateById(p.typeId)?.name || '')}</div>
          <div class="kanban-meta">
            <span class="badge blue">${money(getProposalValue(p))}</span>
            <span class="badge muted">${esc(p.sellerName || 'Sem vendedor')}</span>
            ${p.nextActionDate ? `<span class="badge terra">${brDate(p.nextActionDate)}</span>` : ''}
          </div>
        </article>`;
      }
      function allowDrop(ev){ ev.preventDefault(); }
      function dragProposal(ev,id){ ev.dataTransfer.setData('proposalId', id); }
      function dropProposal(ev,stageId){
        ev.preventDefault();
        const id = ev.dataTransfer.getData('proposalId');
        const p = state.proposals.find(x=>x.id===id);
        if(!p || p.stage === stageId) return;
        const old = stageById(p.stage).name;
        p.stage = stageId;
        p.probability = stageById(stageId).prob;
        p.updatedAt = new Date().toISOString();
        fetch(`${API_URL}/proposals`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(p)}).catch(console.error);
        if(stageId === 'aprovada'){ p.acceptedAt = p.acceptedAt || new Date().toISOString(); }
        audit('alteração de etapa', id, `${p.clientName}: ${old} → ${stageById(stageId).name}`);
        persist();
        toast(`Proposta movida para ${stageById(stageId).name}.`);
        renderShell();
      }

      function emptyProposal(){
        const currentSeller = state.user?.seller || state.user?.role === 'vendedor' ? state.user.name : '';
        const serial = String(state.proposals.length + 1).padStart(4,'0');
        const year = new Date().getFullYear();
        const tpl = state.templates[0] || ORA_DEFAULT_TEMPLATES[0];
        return {
          id:uid('prop'),
          proposalNumber:`ORA-${year}-${serial}`,
          createdAt:new Date().toISOString(),
          updatedAt:new Date().toISOString(),
          stage:'rascunho',
          probability:5,
          typeId:tpl.id,
          headline:tpl.headline || '',
          clientName:'',
          cnpj:'',
          contactName:'',
          contactEmail:'',
          contactPhone:'',
          address:'',
          cityState:'',
          segment:'',
          taxRegime:'',
          indicatedBy:'',
          sellerName:currentSeller,
          technicalOwner:'',
          origin:'',
          valueSetup:'',
          valueMonthly:'',
          valueTotal:'',
          validUntil:addDays(10),
          paymentTerms:'50% na contratação e 50% na entrega, salvo condição específica pactuada.',
          deliveryDeadline:'',
          nextAction:'',
          nextActionDate:'',
          context:tpl.context || '',
          objective:tpl.objective || '',
          scope:tpl.scope || '',
          deliverables:tpl.deliverables || '',
          outOfScope:tpl.outOfScope || '',
          clientResponsibilities:tpl.clientResponsibilities || '',
          timeline:tpl.timeline || '',
          assumptions:tpl.assumptions || '',
          commercialConditions:tpl.commercialConditions || '',
          legalNotes:tpl.legalNotes || '',
          internalNotes:''
        };
      }

            <div class="card clean">

                  <h2 class="section-title">Dados <strong>comerciais</strong></h2>

                </div>

                  ${state.templates.map(t=>`<option value="${t.id}" ${p.typeId===t.id?'selected':''}>${esc(t.name)}</option>`).join('')}
                </select></div>
                <div class="field col-4"><label>Etapa CRM <span class="req">*</span></label><select name="stage" required onchange="ORA.updateProbabilityFromStage(this.value)">
                  ${stages.map(s=>`<option value="${s.id}" ${p.stage===s.id?'selected':''}>${s.name}</option>`).join('')}
                </select></div>
                ${inputField('clientName','Nome do cliente',p.clientName,'col-6')}

                ${inputField('technicalOwner','Responsável técnico',p.technicalOwner,'col-4',false,false)}
                ${inputField('origin','Origem comercial',p.origin,'col-4')}
                ${inputField('probability','Probabilidade (%)',p.probability,'col-2','number')}
                ${inputField('validUntil','Validade da proposta',p.validUntil,'col-3','date')}
                ${inputField('deliveryDeadline','Prazo de execução',p.deliveryDeadline,'col-3')}
                ${inputField('nextAction','Próxima ação comercial',p.nextAction,'col-4',false,false)}
                ${inputField('nextActionDate','Data da próxima ação',p.nextActionDate,'col-2','date',false)}
              </div>
            </div>
            <div class="card clean" style="margin-top:18px">
              <h2 class="section-title">Investimento e <strong>condições</strong></h2>
              <p class="section-hint">Informe valores sem placeholders. A proposta final usa apenas os dados reais cadastrados.</p>

              <div class="form-grid">
                ${inputField('valueSetup','Valor de implantação/projeto',p.valueSetup,'col-3','number',false)}
                ${inputField('valueMonthly','Valor mensal/recorrente',p.valueMonthly,'col-3','number',false)}

            </div>
            <div class="card clean" style="margin-top:18px">
              <h2 class="section-title">Relatório obrigatório da <strong>proposta</strong></h2>

              <div class="divider"></div>
              <div class="form-grid">
                ${inputField('headline','Chamada comercial da proposta',p.headline,'col-12')}
                ${textareaField('context','Contexto comercial',p.context,'col-12')}
                ${textareaField('objective','Objetivo da proposta',p.objective,'col-12')}
                ${textareaField('scope','Escopo detalhado',p.scope,'col-12 tall')}
                ${textareaField('deliverables','Entregáveis',p.deliverables,'col-6')}
                ${textareaField('outOfScope','Fora do escopo',p.outOfScope,'col-6')}
                ${textareaField('clientResponsibilities','Responsabilidades do cliente',p.clientResponsibilities,'col-6')}
                ${textareaField('timeline','Cronograma',p.timeline,'col-6')}

      function inputField(name,label,value,col='col-6',type='text',required=true){
        if(type === true){ type = 'text'; required = false; }
        return `<div class="field ${col}"><label>${label} ${required?'<span class="req">*</span>':''}</label><input name="${name}" type="${type || 'text'}" ${required?'required':''} value="${attr(value)}"></div>`;
      }
      function textareaField(name,label,value,col='col-12',required=true){
        const tall = col.includes('tall');
        const cls = col.replace(' tall','');
        return `<div class="field ${cls}"><label>${label} ${required?'<span class="req">*</span>':''}</label><textarea name="${name}" ${required?'required':''} style="${tall?'min-height:220px':''}">${esc(clean(value))}</textarea></div>`;

      function updateProbabilityFromStage(stageId){
        const input = document.querySelector('[name="probability"]');

      function applyTemplateToForm(id){
        const tpl = templateById(id);
        if(!tpl) return;
        if(!confirm('Aplicar o conteúdo padrão deste modelo nos campos de escopo? Campos preenchidos serão substituídos.')) return;
        ['headline','context','objective','scope','deliverables','outOfScope','clientResponsibilities','timeline','assumptions','commercialConditions','legalNotes'].forEach(k=>{
          const el = document.querySelector(`[name="${k}"]`);
          if(el) el.value = tpl[k] || '';
        });
      }
      function collectForm(form){
        const fd = new FormData(form);
        const obj = {};
        for(const [k,v] of fd.entries()) obj[k] = typeof v === 'string' ? clean(v) : v;
        obj.valueSetup = obj.valueSetup || '';
        obj.valueMonthly = obj.valueMonthly || '';
        obj.valueTotal = obj.valueTotal || '';
        obj.probability = Number(obj.probability || stageById(obj.stage).prob);
        obj.updatedAt = new Date().toISOString();
        return obj;
      }
      function validateProposal(p){
        const missing = requiredFields.filter(([k]) => {
          const val = k === 'valueTotal' ? getProposalValue(p) : p[k];
          return val === null || val === undefined || String(val).trim() === '' || String(val).trim() === '0';
        });
        const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(p.contactEmail || '');
        if(!emailOk) missing.push(['contactEmail','E-mail válido do cliente']);
        return missing;
      }
      function saveProposal(event,isNew){
        event.preventDefault();
        const form = event.target;
        const data = collectForm(form);
        const missing = validateProposal(data);
        const box = document.getElementById('validationBox');
        if(missing.length){
          const html = `<span class="badge terra">Campos pendentes</span><br><br>${missing.map(m=>`• ${m[1]}`).join('<br>')}`;
          if(box) box.innerHTML = html;
          toast('Preencha todos os campos obrigatórios antes de salvar.','warn');
          return;
        }
        const idx = state.proposals.findIndex(p=>p.id===data.id);
        if(idx >= 0){
          state.proposals[idx] = {...state.proposals[idx], ...data};
          audit('edição de proposta', data.id, data.clientName);
          fetch(`${API_URL}/proposals`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(state.proposals[idx])}).catch(console.error);
        }else{
          data.createdAt = data.createdAt || new Date().toISOString();
          state.proposals.push(data);
          audit('cadastro de proposta', data.id, data.clientName);
          fetch(`${API_URL}/proposals`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)}).catch(console.error);

        persist();
        toast('Proposta salva com sucesso.');
        go('proposals');

      function richText(text=''){
        const value = clean(text);
        if(!value) return '<p>—</p>';
        const lines = value.split(/\n+/).map(l=>l.trim()).filter(Boolean);
        let html = '', inList = false;
        const flushList = () => { if(inList){ html += '</ul>'; inList = false; } };
        lines.forEach(line=>{
          const bullet = line.match(/^[-•]\s*(.*)$/);
          if(bullet){
            if(!inList){ html += '<ul>'; inList = true; }
            html += `<li>${esc(bullet[1])}</li>`;
          }else{
            flushList();
            html += `<p>${esc(line)}</p>`;
          }
        });
        flushList();
        return html;
      }

            const STORAGE_KEY = ${JSON.stringify(KEYS.proposals)};
            function protocol(){return 'ORA-ACEITE-' + new Date().toISOString().replace(/[-:.TZ]/g,'').slice(0,14);}
            async function acceptProposal(){
              const name = document.getElementById('acceptName').value.trim();
              const doc = document.getElementById('acceptDoc').value.trim();
              const check = document.getElementById('acceptCheck').checked;
              const result = document.getElementById('acceptResult');
              if(!name || !doc || !check){ result.textContent = 'Preencha os dados e confirme a ciência dos termos.'; return; }
              const payload = {proposalId:PROPOSAL_ID, proposalNumber:PROPOSAL_NUMBER, clientName:CLIENT_NAME, acceptedBy:name, document:doc, acceptedAt:new Date().toISOString(), protocol:protocol(), userAgent:navigator.userAgent};
              try{
                const raw = localStorage.getItem(STORAGE_KEY);
                if(raw){
                  const list = JSON.parse(raw);
                  const idx = list.findIndex(p=>p.id===PROPOSAL_ID);
                  if(idx >= 0){ list[idx].stage='aprovada'; list[idx].status='Aprovada'; list[idx].etapa='Aprovada'; list[idx].probability=100; list[idx].acceptedAt=payload.acceptedAt; list[idx].acceptedBy=name; list[idx].acceptanceProtocol=payload.protocol; list[idx].acceptanceDocument=doc; list[idx].dados_aceite=payload; localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }
                }
              }catch(e){}
              let apiOk = false;
              if(ACCEPTANCE_ENDPOINT){
                try{ const response = await fetch(ACCEPTANCE_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); apiOk = response.ok; }catch(e){}

      async function acceptPublicProposal(id){
        const p = state.proposals.find(x=>x.id===id);

        const ok = document.getElementById('acceptCheck').checked;

        const payload = {proposalId:id, proposalNumber:p.proposalNumber, clientName:p.clientName, acceptedBy:name, document:doc, acceptedAt:new Date().toISOString(), protocol, userAgent:navigator.userAgent};
        const apiResult = await postAcceptance(payload);

        queue.push({...payload, synced: !!apiResult}); save(KEYS.acceptanceQueue, queue);
        res.innerHTML = apiResult
          ? `<strong>Aceite registrado no sistema.</strong><br>Protocolo: ${protocol}`
          : `<strong>Aceite registrado nesta base local.</strong><br>Protocolo: ${protocol}<br>Não foi possível confirmar o envio ao servidor agora.`;

      function renderAudit(){
        const items = state.audit.slice(-30).reverse();
        if(!items.length) return `<div class="empty-state"><strong>Sem histórico</strong><span>As ações comerciais e integrações aparecerão aqui.</span></div>`;
        return `<div class="audit-list">${items.map(a=>`<div class="audit-item"><strong>${esc(a.action)}</strong><span>${new Date(a.at).toLocaleString('pt-BR')} • ${esc(a.user)} • ${esc(a.detail || '')}</span></div>`).join('')}</div>`;
      }
      function apiHeaders(){
        const cfg = state.settings.api;
        let headers = {'Content-Type':'application/json'};
        try{ headers = {...headers, ...JSON.parse(cfg.headers || '{}')}; }catch(e){}
        if(cfg.token){
          if(cfg.authType === 'bearer') headers.Authorization = `Bearer ${cfg.token}`;
          if(cfg.authType === 'apikey') headers[cfg.apiKeyHeader || 'x-api-key'] = cfg.token;
        }
        return headers;
      }
      function endpoint(path, params={}){
        const base = (state.settings.api.baseUrl || '').replace(/\/$/,'');
        let p = path || '';
        Object.keys(params).forEach(k=>p = p.replace(`{${k}}`, encodeURIComponent(params[k])));
        return base + (p.startsWith('/') ? p : '/' + p);
      }
      async function testApi(){
        try{
          if(!state.settings.api.baseUrl){ toast('Informe a Base URL da API nas configurações.','warn'); return; }
          const res = await fetch(endpoint(''), {headers:apiHeaders()});
          audit('teste API Athenas', null, `HTTP ${res.status}`);
          toast(`Teste executado. HTTP ${res.status}.`, res.ok?'success':'warn');
        }catch(e){ audit('erro API Athenas', null, e.message); toast('Falha de conexão. Verifique URL, CORS, token ou backend proxy.','danger'); }
      }
      async function pullAthenas(){
        try{
          if(!state.settings.api.baseUrl){ toast('Configure a Base URL.','warn'); return; }
          const res = await fetch(endpoint(state.settings.api.endpoints.list), {headers:apiHeaders()});
          const data = await res.json();
          const list = Array.isArray(data) ? data : (data.items || data.data || []);
          list.forEach(item=>upsertProposalFromExternal(item));
          persist();
          audit('consulta Athenas', null, `${list.length} registros consultados`);
          toast(`${list.length} registros processados.`);
          renderShell();
        }catch(e){ audit('erro consulta Athenas', null, e.message); toast('Não foi possível consultar a API.','danger'); }
      }
      async function pushSelectedToAthenas(){
        const id = document.getElementById('syncProposalId')?.value;
        const p = state.proposals.find(x=>x.id===id);
        if(!p){ toast('Selecione uma proposta.','warn'); return; }
        await pushToAthenas(p);
      }
      async function pushToAthenas(p){
        try{
          if(!state.settings.api.baseUrl){ toast('Configure a Base URL.','warn'); return; }
          const path = p.externalId ? state.settings.api.endpoints.update : state.settings.api.endpoints.create;
          const url = endpoint(path, {id:p.externalId || p.id});
          const res = await fetch(url, {method:p.externalId?'PUT':'POST',headers:apiHeaders(),body:JSON.stringify(toAthenasPayload(p))});
          const text = await res.text();
          let data = {}; try{ data = JSON.parse(text); }catch(e){}
          if(data.id || data.externalId){ p.externalId = data.id || data.externalId; }
          p.lastSyncAt = new Date().toISOString();
          persist();
          audit('envio Athenas', p.id, `HTTP ${res.status}`);
          toast(`Envio executado. HTTP ${res.status}.`, res.ok?'success':'warn');
        }catch(e){ audit('erro envio Athenas', p.id, e.message); toast('Falha ao enviar para API. Verifique configuração/backend.','danger'); }
      }
      function toAthenasPayload(p){
        return {
          sistemaOrigem:'ORA Propostas',
          idLocal:p.id,
          numero:p.proposalNumber,
          status:p.stage,
          probabilidade:p.probability,
          cliente:{
            nome:p.clientName,
            cnpjCpf:p.cnpj,
            contato:p.contactName,
            email:p.contactEmail,
            telefone:p.contactPhone,
            endereco:p.address,
            cidadeUf:p.cityState,
            segmento:p.segment,
            regimeTributario:p.taxRegime
          },
          comercial:{
            vendedor:p.sellerName,
            indicadoPor:p.indicatedBy,
            origem:p.origin,
            proximaAcao:p.nextAction,
            dataProximaAcao:p.nextActionDate
          },
          proposta:{
            modelo:templateById(p.typeId)?.name,
            tipoId:p.typeId,
            validade:p.validUntil,
            investimentoTotal:getProposalValue(p),
            valorImplantacao:num(p.valueSetup),
            valorMensal:num(p.valueMonthly),
            formaPagamento:p.paymentTerms,
            prazoExecucao:p.deliveryDeadline,
            escopo:p.scope,
            entregaveis:p.deliverables
          },
          html:standaloneHtml(p,true)
        };
      }
      function getPath(obj, path){
        return path.split('.').reduce((o,k)=>o && o[k], obj);
      }
      function upsertProposalFromExternal(item){
        let mapping = {};
        try{ mapping = JSON.parse(state.settings.api.mapping || '{}'); }catch(e){}
        const p = emptyProposal();
        Object.entries(mapping).forEach(([local, externalPath])=>{
          const v = getPath(item, externalPath);
          if(v !== undefined && v !== null) p[local] = String(v);
        });
        p.externalId = item.id || item.externalId || item.codigo || '';
        p.proposalNumber = item.numero || item.proposalNumber || p.proposalNumber;
        p.updatedAt = new Date().toISOString();
        const idx = state.proposals.findIndex(x=>x.externalId && x.externalId === p.externalId);
        if(idx>=0) state.proposals[idx] = {...state.proposals[idx],...p};
        else state.proposals.push(p);
      }
      function importAthenasJson(){

      function copySelectedPayload(){

      function setDeep(obj,path,value){
        const parts = path.split('.');
        let cur = obj;
        for(let i=0;i<parts.length-1;i++){ cur[parts[i]] = cur[parts[i]] || {}; cur = cur[parts[i]]; }
        cur[parts.at(-1)] = value;
      }

          seller:fd.get('seller') === 'on', salt, passHash:await digestPassword(fd.get('password'), salt),
          createdAt:new Date().toISOString()
