              <div class="actions">
                <button class="btn blue" onclick="ORA.sendProposalEmail('${id}')">Enviar conforme configuração</button>
                <button class="btn light" onclick="ORA.openMailTo('${id}')">Abrir cliente de e-mail</button>
                <button class="btn light" onclick="ORA.downloadProposalHtml('${id}', true)">Baixar HTML para anexar</button>
                <button class="btn light" onclick="ORA.copyEmailBody()">Copiar mensagem</button>
                <button class="btn ghost" onclick="ORA.closeModal()">Fechar</button>
              </div>
            </div>
          </div>`);
      }
      function renderTemplateString(str,p){
        return String(str || '').replace(/\{\{(\w+)\}\}/g, (_,key)=>{
          if(key === 'modelName') return templateById(p.typeId)?.name || '';
          if(key === 'valueTotal') return money(getProposalValue(p));
          return p[key] || '';
        });
      }
      function copyEmailBody(){
        const body = document.getElementById('emailBody')?.value || '';
        navigator.clipboard?.writeText(body);
        toast('Mensagem copiada.');
      }
      function openMailTo(id){
        const p = state.proposals.find(x=>x.id===id);
        const to = document.querySelector('[name="emailTo"]')?.value || p.contactEmail;
        const subject = document.querySelector('[name="emailSubject"]')?.value || '';
        const body = document.getElementById('emailBody')?.value || '';
        const mailtoUrl = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        const win = window.open(mailtoUrl, '_blank', 'noopener,noreferrer');
        if(!win){
          const a = document.createElement('a');
          a.href = mailtoUrl;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          document.body.appendChild(a); a.click(); a.remove();
        }
        markSent(p);
      }
      async function sendProposalEmail(id){
        const p = state.proposals.find(x=>x.id===id);
        const to = document.querySelector('[name="emailTo"]')?.value || p.contactEmail;
        const subject = document.querySelector('[name="emailSubject"]')?.value || '';
        const body = document.getElementById('emailBody')?.value || '';
        const html = standaloneHtml(p,true);
        if(state.settings.email.mode === 'webhook' && state.settings.email.webhookUrl){
          let headers = {'Content-Type':'application/json'};
          try{ headers = {...headers, ...JSON.parse(state.settings.email.headers || '{}')}; }catch(e){}
          try{
            const res = await fetch(state.settings.email.webhookUrl,{
              method:state.settings.email.webhookMethod || 'POST',
              headers,
              body:JSON.stringify({to, from:state.settings.email.from, subject, text:body, attachment:{filename:`${p.proposalNumber}.html`, content:html}, proposal:toAthenasPayload(p)})
            });
            markSent(p);
            audit('envio e-mail webhook', p.id, `HTTP ${res.status}`);
            toast(`Envio acionado via webhook. HTTP ${res.status}.`, res.ok?'success':'warn');
            closeModal(); renderShell();
          }catch(e){ toast('Falha no webhook de e-mail. Verifique CORS/backend/configuração.','danger'); }
        }else{
          openMailTo(id);
          toast('Cliente de e-mail aberto. Baixe o HTML para anexar manualmente.');
        }
      }
      function markSent(p){
        if(!p) return;
        if(['rascunho','diagnostico','elaboracao'].includes(p.stage)){
          p.stage='enviada'; p.probability=stageById('enviada').prob;
        }
        p.sentAt = new Date().toISOString();
        p.updatedAt = new Date().toISOString();
        audit('proposta enviada', p.id, p.clientName);
        persist();
      }

      function showModal(inner){
        const existing = document.getElementById('modalRoot');
        if(existing) existing.remove();
        const div = document.createElement('div');
        div.id = 'modalRoot';
        div.className = 'modal-backdrop';
        div.innerHTML = `<div class="modal">${inner}</div>`;
        div.addEventListener('click', e=>{ if(e.target === div) closeModal(); });
        document.body.appendChild(div);
      }
      function closeModal(){ document.getElementById('modalRoot')?.remove(); }

      function exportBackup(){
        const data = {users:state.users.map(({passHash,salt,...u})=>u), proposals:state.proposals, templates:state.templates, settings:{...state.settings, api:{...state.settings.api, token:'[REMOVIDO]'}}, exportedAt:new Date().toISOString()};
        const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `ora_crm_propostas_backup_${today()}.json`;
        document.body.appendChild(a); a.click(); a.remove();
        toast('Backup exportado sem senhas e sem token.');
      }

      return {
        init, go, logout, createAdmin, login, setFilter, saveProposal, updateProbabilityFromStage, applyTemplateToForm,
        openPreview, printProposal, savePreviewEdits, downloadProposalHtml, duplicateProposal,
        allowDrop, dragProposal, dropProposal,
        openTemplateModal, saveTemplate, cloneTemplate, deleteTemplate, restoreTemplate,
        testApi, pullAthenas, pushSelectedToAthenas, copySelectedPayload, importAthenasJson,
        saveSettings, createUser, toggleUser, resetPasswordPrompt,
        openEmailModal, sendProposalEmail, openMailTo, copyEmailBody,
        acceptPublicProposal, closeModal, exportBackup
      };
    })();
    window.ORA = APP;
    APP.init();
  </script>
</body>
</html>
